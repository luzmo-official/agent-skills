name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run typecheck
      - run: npm run build
      - run: npm run plugins:build
      - name: Verify root marketplace manifests are in sync with plugin.config.yaml
        run: git diff --exit-code .cursor-plugin .claude-plugin .codex-plugin .agents/plugins .mcp.json

  evals-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm run evals:validate
